refresh_rate: 30 seconds
appenders:
  stdout:
    kind: console
    encoder:
        pattern: "{d(%+)(utc)} [{f}:{L}] {h({l})} {M}:{m}{n}"
    filters:
        - kind: threshold
          level: debug
  logfile:
    kind: rolling_file
    path: "logs/mm.log"
    append: true
    encoder:
      pattern: "[{d(%Y-%m-%dT%H:%M:%S%.6f)} {h({l}):<5.5} {M}] {m}{n}"
      # pattern: "{d} - {m}{n}"
    policy:
      kind: compound

      trigger:
        kind: size
        limit: 10 mb

      roller:
        kind: delete
root:
  level: debug
  appenders:
    - stdout
    - logfile
