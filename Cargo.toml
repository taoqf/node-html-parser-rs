[package]
name = "dfactory01"
version = "0.1.0"
edition = "2021"

[dependencies]
actix-web = "4.9.0"
dotenvy = "0.15.7"
log = "0.4.22"
log4rs = "1.3.0"
bb8 = "0.8"
bb8-tiberius = "0.15"
chrono = "0.4.39"
tokio = { version = "1.42.0", features = ["full"] }
urlencoding = "2.1.3"
serde_json = "1.0"
# sea-orm = "1.1.3"
# canyon_sql = "0.5.1"
welds = "0.4.10"
# diesel = { version = "2.2.6", features = ["postgres"] }

[dependencies.reqwest]
version = "0.12.12"
features = ["json"]

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.sqlx]
version = "0.8.3"
features = ["chrono", "runtime-async-std"]

[dependencies.welds-connections]
version = "0.4.10"
features = ["full"]

[dependencies.uuid]
version = "1.11.0"
features = [
	"v4",                # Lets you generate random UUIDs
	"fast-rng",          # Use a faster (but still sufficiently random) RNG
	"macro-diagnostics", # Enable better diagnostics for compile-time UUIDs
]
