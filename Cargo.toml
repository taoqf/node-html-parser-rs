[package]
name = "dfactory01"
version = "0.1.0"
edition = "2021"

[dependencies]
dotenvy = "0.15.7"
log = "0.4.22"
log4rs = "1.3.0"
bb8 = "0.8"
bb8-tiberius = "0.15"
chrono = "0.4.39"
urlencoding = "2.1.3"
serde_json = "1.0"
# sea-orm = "1.1.3"
# canyon_sql = "0.5.1"
rust_decimal = "1.36.0"
# diesel = { version = "2.2.6", features = ["postgres"] }

[dependencies.axum]
version = "0.8.1"
features = ["json"]

[dependencies.tokio]
version = "1.42.0"
features = ["full"]

[dependencies.tiberius]
version = "0.12.3"
features = ["rust_decimal"]

[dependencies.reqwest]
version = "0.12.12"
features = ["json"]

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.sqlx]
version = "0.8.3"
features = ["chrono", "runtime-async-std", "rust_decimal"]

[dependencies.welds]
version = "0.4.10"
features = ["mssql", "postgres", "mysql"]

[dependencies.welds-connections]
version = "0.4.10"
features = ["mssql", "mssql-rust_decimal", "postgres", "mysql"]

[dependencies.uuid]
version = "1.11.0"
features = [
	"v4",                # Lets you generate random UUIDs
	"fast-rng",          # Use a faster (but still sufficiently random) RNG
	"macro-diagnostics", # Enable better diagnostics for compile-time UUIDs
]
