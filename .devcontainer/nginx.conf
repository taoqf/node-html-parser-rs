map $http_upgrade $connection_upgrade {
	default	upgrade;
	''	close;
}

server {
	listen	${NGINX_PORT};
	listen	[::]:${NGINX_PORT};
	server_name	${NGINX_DOMAIN};

	client_max_body_size	200M;

	charset	utf-8;
	# gzip	on;  #开启gzip压缩功能
	
	# gzip_min_length 1k;#设置允许压缩的页面最小字节数，页面字节数从header头的content-length中获取。默认值是0,不管页面多大都进行压缩。建议设置成大于1k。如果小于1k可能会越压越大。
	
	# gzip_buffers 4 16k;#压缩缓冲区大小。表示申请4个单位为16k的内容作为压缩结果流缓存，默认值是申请与原始数据大小相同的内存空间来存储gzip压缩结果。

	# gzip_http_version 1.1;#压缩版本（默认1.1，前端为squid2.5时使用1.0）用于设置识别http协议版本，默认是1.1,目前大部分浏览器已经支持gzip解压，使用默认即可。
	
	# gzip_comp_level 2;#压缩比率。用来指定gzip压缩比，1压缩比量小，处理速度快；9压缩比量大，传输速度快，但处理最慢，也必将消耗cpu资源。
	# gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript; #用来指定压缩的类型，“text/html”类型总是会被压缩。

	# gzip_vary on; #vary header支持。该选项可以让前端的缓存服务器缓存经过gzip压缩的页面，例如用squid缓存经过nginx压缩的数据。要注意：需要和不需要压缩的对象 （1）大于1k的纯文本文件html,js,css,xml,html. （2）图片，视频等不要压缩，因为不但不会减小，在压缩时消耗cpu和内存资源。
	# gzip_proxied expired no-cache no-store private auth;

	# access_log /var/log/nginx/host.access.log  main;

	location ^~ /adminer {
		proxy_set_header Host $host:8080;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
		# proxy_pass   http://upsadminer;
		proxy_pass http://adminer:8080;
	}
	# location ^~ /preview {
	#   proxy_pass   http://upfileview;
	# }
	# location / {
	# 	index /${NGINX_BASEPATH};
	# }
	# location ^~ /${NGINX_BASEPATH} {
	location / {
		# proxy_set_header Host $host:$server_port;
		proxy_set_header Host $host;
		proxy_set_header Port $server_port;
		proxy_set_header scheme $scheme;
		proxy_set_header request_uri $request_uri;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		set $x_forwarded_proto $scheme;
		if ($http_x_forwarded_proto != '') {
			set $x_forwarded_proto	$http_x_forwarded_proto;
		}
		proxy_set_header x-forwarded-proto $x_forwarded_proto;
		set $x_forwarded_port $server_port;
		if ($http_x_forwarded_port != '') {
			set $x_forwarded_port	$http_x_forwarded_port;
		}
		proxy_set_header x-forwarded-port $x_forwarded_port;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "Upgrade";
		proxy_connect_timeout 4s;	#配置点1
		proxy_read_timeout 60s;	  #配置点2，如果没效，可以考虑这个时间配置长一点
		proxy_send_timeout 12s;	  #配置点3
		# proxy_pass   http://upswebserver/${NGINX_BASEPATH};
		# proxy_pass   http://upswebserver/;
		proxy_pass http://webserver:3000;
	}
	# location / {
	#	 root   /usr/share/nginx/html;
	#	 index  index.html index.htm;
	# }

	#error_page  404	  /404.html;

	# redirect server error pages to the static page /50x.html
	#
	error_page	500 502 503 504  /50x.html;
	location = /50x.html {
		root	/usr/share/nginx/html;
	}
}
